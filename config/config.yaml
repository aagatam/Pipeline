# Project metadata
project:
  name: my_project
  output_dir: results

input:
  samples: Test_data/samples.tsv
  compression: gz

# References
reference:
  genome_fasta: Test_data/genome.fa
  annotation_gtf: Test_data/annotation.gtf
  transcriptome_fasta: Test_data/transcripts.fa

sequencing:
  layout: paired # single | paired

# Tools
trimming:
  enabled: true
  threads: 4

alignment:
  method: hisat2 # hisat2 | kallisto
  threads: 8

spladder:
  enabled: false

bisbee:
  enabled: false
  ensembl_release: 104

interproscan:
  enabled: false

# Differential expression
dge:
  method: deseq2
