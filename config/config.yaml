# Project metadata
project:
  name: my_project
  output_dir: results

# Input type
mode: rnaseq # options: rnaseq | microarray

# Samples
samples: config/samples.tsv

# References
reference:
  genome_fasta: /path/to/genome.fa
  annotation_gtf: /path/to/annotation.gtf
  transcriptome_fasta: /path/to/cdna.fa

# Tools
trimming:
  enabled: true
  threads: 4

alignment:
  method: hisat2 # hisat2 | kallisto
  threads: 8

spladder:
  enabled: true

bisbee:
  enabled: true

interproscan:
  enabled: true

# Differential expression
dge:
  method: deseq2
