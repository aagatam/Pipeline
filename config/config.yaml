# Project metadata
project:
  name: my_project
  output_dir: results

input:
  samples: config/samples.tsv
  compression: gz

sequencing:
  layout: paired

# References
reference:
  genome_fasta: /path/to/genome.fa
  annotation_gtf: /path/to/annotation.gtf
  transcriptome_fasta: /path/to/cdna.fa

sequencing:
  layout: single # single | paired

input:
  compression: dsrc # none | gz | dsrc

# Tools
trimming:
  enabled: true
  threads: 4

alignment:
  method: hisat2 # hisat2 | kallisto
  threads: 8

spladder:
  enabled: true

bisbee:
  enabled: true
  ensembl_release: 104

interproscan:
  enabled: true

# Differential expression
dge:
  method: deseq2
